<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Счетчик</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary: #007bff;
            --danger: #dc3545;
            --secondary: #6c757d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        h1 { margin-bottom: 30px; font-size: 24px; }

        .counter-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
            text-align: center;
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--secondary);
        }

        .number {
            font-size: 4rem;
            font-weight: bold;
            margin: 10px 0;
            color: var(--primary);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 15px;
        }

        button {
            border: none;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            touch-action: manipulation; /* Убирает задержку клика на мобилках */
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .btn-plus {
            background-color: var(--primary);
            color: white;
            flex: 2;
            padding: 20px;
        }

        .btn-minus {
            background-color: var(--secondary);
            color: white;
            flex: 1;
            padding: 20px;
        }

        .btn-reset {
            background-color: transparent;
            color: var(--danger);
            font-size: 0.9rem;
            padding: 10px;
            width: 100%;
            border: 1px solid var(--danger);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Трекер привычек</h1>

    <!-- Блок Сигареты -->
    <div class="counter-card">
        <div class="title">СИГАРЕТЫ</div>
        <div class="number" id="cig-val">0</div>
        <div class="controls">
            <button class="btn-minus" onclick="change('cig', -1)">-</button>
            <button class="btn-plus" onclick="change('cig', 1)">+</button>
        </div>
        <button class="btn-reset" onclick="resetCounter('cig')">Сбросить счетчик</button>
    </div>

    <!-- Блок Стики -->
    <div class="counter-card">
        <div class="title">СТИКИ (IQOS)</div>
        <div class="number" id="stick-val">0</div>
        <div class="controls">
            <button class="btn-minus" onclick="change('stick', -1)">-</button>
            <button class="btn-plus" onclick="change('stick', 1)">+</button>
        </div>
        <button class="btn-reset" onclick="resetCounter('stick')">Сбросить счетчик</button>
    </div>

    <div class="footer">Данные сохраняются автоматически</div>

    <script>
        // Инициализация данных при загрузке
        let data = {
            cig: parseInt(localStorage.getItem('cig')) || 0,
            stick: parseInt(localStorage.getItem('stick')) || 0
        };

        // Обновление цифр на экране
        function updateDisplay() {
            document.getElementById('cig-val').innerText = data.cig;
            document.getElementById('stick-val').innerText = data.stick;
            
            // Сохранение в память браузера
            localStorage.setItem('cig', data.cig);
            localStorage.setItem('stick', data.stick);
        }

        // Функция изменения (плюс/минус)
        function change(type, amount) {
            data[type] += amount;
            if (data[type] < 0) data[type] = 0; // Чтобы не уходило в минус
            updateDisplay();
        }

        // Функция сброса
        function resetCounter(type) {
            if (confirm("Обнулить этот счетчик?")) {
                data[type] = 0;
                updateDisplay();
            }
        }

        // Выводим данные при первом запуске
        updateDisplay();
    </script>
</body>
</html>
